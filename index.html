<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Game Xuyên Không</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564") no-repeat center/cover;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* panel */
.panel {
    width: 420px;
    background: #d6d6eb;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
    text-align: center;
}

h1 {
    margin-bottom: 10px;
}

/* drama */
#drama {
    font-style: italic;
    color: #444;
    min-height: 30px;
    margin-bottom: 10px;
}

/* stats */
#stats {
    text-align: left;
    line-height: 1.6;
}

/* buttons */
.buttons {
    margin-top: 20px;
}

button {
    background: #cbb7ff;
    border: none;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #b39aff;
}

/* intro */
#intro { display: block; }
#game { display: none; }

/* EFFECT */
#effect {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

/* money */
.floating {
    position: absolute;
    font-size: 24px;
    animation: floatUp 1s ease-out forwards;
}

@keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
}

/* heart */
.heart {
    position: absolute;
    font-size: 30px;
    animation: heartPop 1s ease-out forwards;
}

@keyframes heartPop {
    0% { opacity: 1; transform: scale(0.5); }
    50% { transform: scale(1.5); }
    100% { opacity: 0; transform: scale(1); }
}
</style>

</head>

<body>

<!-- INTRO -->
<div class="panel" id="intro">
    <h1>Game Xuyên Không</h1>
    <p>
        Một ngày nọ bạn bị xuyên không...<br><br>
        Bạn phải xây dựng cuộc đời từ con số 0<br>
        Tiền bạc - Tình yêu - Sự nghiệp<br><br>
        Nhưng hãy cẩn thận...<br>
        Cuộc đời này đầy drama 💔
    </p>
    <button onclick="startGame()">✨ Xuyên không</button>
</div>

<!-- GAME -->
<div class="panel" id="game">
    <h1>Game Xuyên Không</h1>
    <div id="drama"></div>
    <div id="stats"></div>
    <div class="buttons" id="buttons"></div>
</div>

<!-- EFFECT -->
<div id="effect"></div>

<script>
let age = 18;
let iq = 100;
let money = 1000;
let savings = 0;
let investment = 0;
let job = "Thất nghiệp";

let lover = null;
let cheated = false;

const names = ["Phương Trâm", "Bích Tuyền", "Ngọc Nhi", "Anh Thư", "Bảo Khang"];

/* START */
function startGame() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("game").style.display = "block";
    mainMenu();
}

/* EFFECT MONEY */
function showMoneyEffect() {
    let container = document.getElementById("effect");

    for (let i = 0; i < 6; i++) {
        let el = document.createElement("div");
        el.className = "floating";
        el.innerText = "💸";

        el.style.left = (50 + (Math.random()*40 - 20)) + "%";
        el.style.top = "60%";

        container.appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }
}

/* EFFECT HEART */
function showHeartEffect() {
    let container = document.getElementById("effect");

    let el = document.createElement("div");
    el.className = "heart";
    el.innerText = "❤️";

    el.style.left = "50%";
    el.style.top = "50%";
    el.style.transform = "translate(-50%, -50%)";

    container.appendChild(el);
    setTimeout(() => el.remove(), 1000);
}

/* RANDOM LOVER */
function randomLover() {
    return names[Math.floor(Math.random() * names.length)];
}

/* UI */
function updateUI(dramaText="") {
    document.getElementById("drama").innerText = dramaText;

    document.getElementById("stats").innerHTML = `
    🎂 Tuổi: ${age} <br>
    🧠 IQ: ${iq} <br>
    💼 Nghề: ${job} <br>
    💰 Tiền: ${money}$ <br>
    🏦 Tiết kiệm: ${savings}$ <br>
    📈 Đầu tư: ${investment}$ <br>
    ❤️ Người yêu: ${lover ? lover : "Chưa có"}
    `;
}

/* BUTTON */
function setButtons(list) {
    let div = document.getElementById("buttons");
    div.innerHTML = "";

    list.forEach(b => {
        let btn = document.createElement("button");
        btn.innerText = b.text;
        btn.onclick = b.action;
        div.appendChild(btn);
    });
}

/* NEXT YEAR */
function nextYear() {
    age++;

    let rand = Math.random();

    if (rand < 0.2) {
        investment = Math.max(0, investment - 500);
        showMoneyEffect();
        updateUI("💥 Bạn bị lừa đầu tư!");
        return mainMenu();
    }

    if (rand < 0.4 && lover) {
        cheated = true;
        lover = null;
        updateUI("💔 Bạn bị cắm sừng!");
        return mainMenu();
    }

    if (age >= 45) {
        return ending();
    }

    mainMenu();
}

/* MENU */
function mainMenu() {
    updateUI();

    setButtons([
        {
            text: "📚 Học",
            action: () => {
                iq += 5;
                money -= 200;
                nextYear();
            }
        },
        {
            text: "💼 Đi làm",
            action: () => {
                job = "Nhân viên";
                money += 400 + iq;
                nextYear();
            }
        },
        {
            text: "🏦 Tiết kiệm",
            action: () => {
                savings += 300;
                money -= 300;
                nextYear();
            }
        },
        {
            text: "📈 Đầu tư",
            action: () => {
                money -= 500;
                if (Math.random() > 0.5) {
                    investment += 1000;
                } else {
                    investment += 200;
                }
                nextYear();
            }
        },
        {
            text: "❤️ Hẹn hò",
            action: () => {
                if (!lover) {
                    lover = randomLover();
                    cheated = false;
                    showHeartEffect();
                    updateUI("💘 Bạn đang yêu " + lover);
                } else {
                    updateUI("💑 Bạn vẫn đang yêu " + lover);
                }
                mainMenu();
            }
        }
    ]);
}

/* ENDING */
function ending() {
    let total = money + savings + investment;
    let end = "";

    if (total > 30000 && lover) {
        end = "🏆 Happy Ending: Giàu + tình yêu!";
    }
    else if (total > 30000) {
        end = "💰 Tỷ phú cô đơn.";
    }
    else if (lover && cheated) {
        end = "💔 Drama Ending: Bị phản bội.";
    }
    else if (lover) {
        end = "❤️ Bình yên bên người yêu.";
    }
    else {
        end = "😢 Trắng tay.";
    }

    updateUI(end);

    setButtons([
        {
            text: "🔄 Chơi lại",
            action: () => location.reload()
        }
    ]);
}
</script>

</body>
</html>
