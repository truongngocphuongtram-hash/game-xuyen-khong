<!DOCTYPE html>
<html>
<head>
  <title>Game Xuyên Không PRO MAX</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #141e30, #243b55);
      color: white;
      text-align: center;
    }

    #box {
      background: rgba(0,0,0,0.6);
      padding: 20px;
      margin: 50px auto;
      width: 350px;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: black;
      padding: 30px;
      border-radius: 10px;
      display: none;
      font-size: 20px;
    }
  </style>
</head>

<body>

<div id="box">
  <h1>🌌 Game Xuyên Không</h1>

  <p>💰 Tiền: <span id="money">100</span></p>
  <p>😵 Stress: <span id="stress">0</span></p>
  <p>❤️ Tình cảm: <span id="love">0</span></p>
  <p>🎂 Tuổi: <span id="age">18</span></p>

  <button onclick="lamViec()">💼 Làm việc</button>
  <button onclick="choiGame()">🎮 Giải trí</button>
  <button onclick="henHo()">💘 Hẹn hò</button>
  <button onclick="suKien()">🎲 Sự kiện</button>
  <button onclick="mayMan()" id="luckBtn">🍀 May mắn (1 lần)</button>
</div>

<div id="popup"></div>

<script>
let money = 100;
let stress = 0;
let love = 0;
let usedLuck = false;
let age = 18;

let nguoiYeu = ["Phương Trâm", "Bích Tuyền", "Ngọc Nhi", "Anh Thư", "Bảo Khang"];

function update() {
  document.getElementById("money").innerText = money;
  document.getElementById("stress").innerText = stress;
  document.getElementById("love").innerText = love;
  document.getElementById("age").innerText = age;
  checkEnd();
}

function showPopup(text) {
  let p = document.getElementById("popup");
  p.innerText = text;
  p.style.display = "block";

  setTimeout(() => {
    p.style.display = "none";
  }, 2000);
}

function lamViec() {
  money += 50;
  stress += 10;
  age++;
  showPopup("💼 Kiếm tiền +50");
  update();
}

function choiGame() {
  stress -= 10;
  showPopup("🎮 Giảm stress");
  update();
}

function henHo() {
  let ny = nguoiYeu[Math.floor(Math.random()*nguoiYeu.length)];

  let r = Math.random();

  if (r < 0.5) {
    love += 20;
    money -= 20;
    showPopup("❤️ Hẹn hò với " + ny + " +20 tình cảm");
  } else {
    love -= 30;
    stress += 20;
    showPopup("💔 " + ny + " phản bội bạn!");
  }

  update();
}

function suKien() {
  let r = Math.random();

  if (r < 0.3) {
    money += 200;
    showPopup("🎉 Trúng lớn! 💰 +200");
  } 
  else if (r < 0.6) {
    money -= 100;
    stress += 20;
    showPopup("⚠️ Bị lừa! -100 tiền");
  } 
  else {
    showPopup("😐 Không có gì xảy ra");
  }

  update();
}

function mayMan() {
  if (usedLuck) return;

  usedLuck = true;
  document.getElementById("luckBtn").disabled = true;

  let r = Math.random();

  if (r < 0.33) {
    money += 300;
    showPopup("🍀 May mắn tiền!");
  } else if (r < 0.66) {
    love += 50;
    showPopup("🍀 May mắn tình cảm!");
  } else {
    stress -= 50;
    showPopup("🍀 Giảm stress!");
  }

  update();
}

function checkEnd() {

  if (money <= 0) {
    endGame("💀 Bạn phá sản!");
    return;
  }

  if (stress >= 100) {
    endGame("😵 Bạn kiệt sức!");
    return;
  }

  if (love <= -50) {
    endGame("💔 Bạn bị phản bội!");
    return;
  }

  if (love >= 100) {
    endGame("💍 Bạn có tình yêu viên mãn!");
    return;
  }

  if (money >= 1000 && stress < 80) {
    endGame("👑 Bạn trở thành đại gia!");
    return;
  }

  if (money > 500 && love < 0 && stress < 50) {
    endGame("🌀 Ending bí mật: Giàu nhưng cô đơn!");
    return;
  }

  if (age >= 40 && money < 1000) {
    endGame("😐 Bạn sống bình thường...");
    return;
  }
}

function endGame(text) {
  document.getElementById("popup").style.display = "block";
  document.getElementById("popup").innerText = text + " (Reload để chơi lại)";
}
</script>

</body>
</html>
