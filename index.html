<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Game Xuyên Không</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564") center/cover;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* panel */
.panel {
    width: 420px;
    background: #dcdcf5;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
}

/* STATUS */
#status {
    height: 25px;
    overflow: hidden;
    position: relative;
}

.statusText {
    position: absolute;
    width: 100%;
    animation: slide 2.5s linear;
}

@keyframes slide {
    0% { transform: translateY(20px); opacity: 0 }
    20% { opacity: 1 }
    80% { opacity: 1 }
    100% { transform: translateY(-20px); opacity: 0 }
}

/* drama */
#drama {
    font-style: italic;
    height: 25px;
}

/* stats */
#stats {
    text-align: left;
}

/* buttons */
button {
    background: #cbb7ff;
    border: none;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    cursor: pointer;
}

/* EFFECT */
#effect {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

/* MONEY */
.money {
    position: absolute;
    left: 50%;
    top: 60%;
    transform: translate(-50%, -50%);
    font-size: 50px;
    animation: moneyFly 2.5s ease-out forwards;
}

@keyframes moneyFly {
    0% { transform: translate(-50%, -50%) scale(1); opacity: 1 }
    100% { transform: translate(-50%, -200px) scale(2); opacity: 0 }
}

/* HEART */
.heart {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-size: 70px;
    animation: heartBoom 2.5s ease-out forwards;
}

@keyframes heartBoom {
    0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1 }
    50% { transform: translate(-50%, -50%) scale(2) }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 0 }
}
</style>
</head>

<body>

<div class="panel">
    <h2>Game Xuyên Không</h2>

    <div id="status"></div>
    <div id="drama"></div>
    <div id="stats"></div>
    <div id="buttons"></div>
</div>

<div id="effect"></div>

<script>
let age = 18;
let iq = 100;
let money = 1000;
let savings = 0;
let investment = 0;
let job = "Thất nghiệp";
let lover = null;
let gameOver = false;

const names = ["Phương Trâm","Bích Tuyền","Ngọc Nhi","Anh Thư","Bảo Khang"];

/* STATUS FIX */
function showStatus(text) {
    let div = document.getElementById("status");

    let el = document.createElement("div");
    el.className = "statusText";
    el.innerText = text;

    div.appendChild(el);

    setTimeout(()=> el.remove(), 2500);
}

/* EFFECT FIX */
function moneyEffect() {
    let e = document.createElement("div");
    e.className = "money";
    e.innerText = "💸";
    document.getElementById("effect").appendChild(e);

    setTimeout(()=>e.remove(),2500);
}

function heartEffect() {
    let e = document.createElement("div");
    e.className = "heart";
    e.innerText = "❤️";
    document.getElementById("effect").appendChild(e);

    setTimeout(()=>e.remove(),2500);
}

/* UI */
function updateUI(drama="") {
    document.getElementById("drama").innerText = drama;

    document.getElementById("stats").innerHTML = `
    🎂 ${age} tuổi<br>
    🧠 ${iq}<br>
    💼 ${job}<br>
    💰 ${money}$<br>
    🏦 ${savings}$<br>
    📈 ${investment}$<br>
    ❤️ ${lover ? lover : "sói hoang cô độc"}
    `;
}

/* AGE FIX */
function growAge() {
    age += Math.floor(Math.random()*4)+2;
}

/* GAME LOOP FIX */
function next(action) {
    if(gameOver) return;

    action();
    updateUI();

    if(age >= 45){
        return ending();
    }
}

/* BUTTON */
function renderButtons() {
    let div = document.getElementById("buttons");
    div.innerHTML = "";

    const actions = [
        {
            text:"📚 Học",
            action:()=>{
                iq+=5;
                money-=200;
                growAge();
                showStatus("📚 Bạn đang học");
            }
        },
        {
            text:"💼 Làm",
            action:()=>{
                job="Đời công nhân";
                money+=400+iq;
                growAge();
                showStatus("💼 Bạn đi làm");
            }
        },
        {
            text:"🏦 Tiết kiệm",
            action:()=>{
                savings+=300;
                money-=300;
                growAge();
                showStatus("🏦 Bạn tiết kiệm");
            }
        },
        {
            text:"📈 Đầu tư",
            action:()=>{
                money-=500;
                growAge();

                if(Math.random()>0.5){
                    investment+=1200;
                    showStatus("💰 Thắng lớn!");
                }else{
                    investment+=200;
                    moneyEffect();
                    showStatus("💸 Thua lỗ!");
                }
            }
        },
        {
            text:"❤️ Hẹn hò",
            action:()=>{
                growAge();

                if(!lover){
                    lover=names[Math.floor(Math.random()*names.length)];
                    heartEffect();
                    showStatus("😊 Hẹn hò với "+lover);
                }else{
                    showStatus("❤️ Đang yêu "+lover);
                }
            }
        }
    ];

    actions.forEach(a=>{
        let btn=document.createElement("button");
        btn.innerText=a.text;
        btn.onclick=()=> next(a.action);
        div.appendChild(btn);
    });
}

/* END */
function ending(){
    gameOver = true;

    let total = money+savings+investment;
    let text = "";

    if(total>30000 && lover){
        text="🏆 Viên mãn-tiền không thiếu tình không vơi";
    }else if(total>30000){
        text="💰 fuba cô độc-đếm tiền mỏi tay ko ai năm tay";
    }else if(lover){
        text="❤️ đời không plot twist";
    }else{
        text="😢 Thất bại-chơi gì ngu vại bạn";
    }

    updateUI(text);

    document.getElementById("buttons").innerHTML =
        '<button onclick="location.reload()">Chơi lại</button>';
}

/* INIT */
updateUI();
renderButtons();
</script>

</body>
</html>
