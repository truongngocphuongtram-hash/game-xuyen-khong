<script>
let age = 18;
let iq = 70;
let money = 1000;
let savings = 0;
let investment = 0;
let job = "Ăn bám bố mẹ";
let lover = null;
let gameOver = false;

const names = ["Phương Trâm","Bích Tuyền","Ngọc Nhi","Anh Thư","Bảo Khang"];

/* START */
function startGame(){
    document.getElementById("intro").style.display="none";
    document.getElementById("game").style.display="block";
    updateUI(); // thêm để cập nhật UI ngay
}

/* STATUS */
function showStatus(text){
    let el=document.createElement("div");
    el.className="statusText";
    el.innerText=text;
    document.getElementById("status").appendChild(el);
    setTimeout(()=>el.remove(),2500);
}

/* EFFECT */
function moneyEffect(){
    let e=document.createElement("div");
    e.className="money";
    e.innerText="💸";
    document.getElementById("effect").appendChild(e);
    setTimeout(()=>e.remove(),2500);
}

function heartEffect(){
    let e=document.createElement("div");
    e.className="heart";
    e.innerText="❤️";
    document.getElementById("effect").appendChild(e);
    setTimeout(()=>e.remove(),2500);
}

/* DRAMA RANDOM */
function randomDrama(){
    let events=[
        "💔 trở thành con trâu có sừng dài nhất thế giới",
        "🎁 Trúng thưởng-may mắn đến",
        "😷 Bệnh tật",
        "🔥 +1 nhát dao từ đồng nghiệp"
    ];

    let e=events[Math.floor(Math.random()*events.length)];

    if(e.includes("Trúng")) money+=2000;
    if(e.includes("Bệnh")) money-=500;

    return e;
}

/* UI */
function updateUI(drama=""){
    document.getElementById("drama").innerText=drama;

    document.getElementById("stats").innerHTML=`
    🎂 ${age} tuổi<br>
    🧠 ${iq}<br>
    💼 ${job}<br>
    💰 ${money}$<br>
    🏦 ${savings}$<br>
    📈 ${investment}$<br>
    ❤️ ${lover ? lover : "Sói hoang cô độc"}
    <br><progress value="${age}" max="45"></progress>
    `;
}

/* AGE */
function growAge(){
    age += Math.floor(Math.random()*4)+2;
}

/* NEXT */
function next(action){
    if(gameOver) return;

    action();
    growAge();

    let drama=randomDrama();
    updateUI(drama);
    renderButtons();

    if(money<0){
        endGame("💀 Phá sản");
        return;
    }

    if(age>=45){
        ending();
    }
}

/* BUTTON */
function renderButtons(){
    let div = document.getElementById("buttons");
    div.innerHTML="";

    const actions=[
        {
            text:"📚 Học",
            action:()=>{
                iq+=5;
                money-=200;
                showStatus("📚 Đang trog ngôi trg hạnh phúc");
            }
        },
        {
            text:"💼 Làm",
            action:()=>{
                money+=400+iq;
                if(iq>180) job="🧠 Thiên tài";
                else if(iq>140) job="💻 Lập trình viên-dân IT";
                else job="👷 Công nhân";
                showStatus("💼 Làm trâu làm ngụa");
            }
        },
        {
            text:"🏦 Tiết kiệm",
            action:()=>{
                savings+=300;
                money-=300;
                showStatus("🏦 Gửi nhà bank");
            }
        },
        {
            text:"📈 Đầu tư",
            action:()=>{
                money-=500;
                if(Math.random()>0.5){
                    investment+=1500;
                    showStatus("💰 Lãi lớn!");
                }else{
                    investment-=300;
                    moneyEffect();
                    showStatus("💸 Lỗ!");
                }
            }
        },
        {
            text:"❤️ Hẹn hò",
            action:()=>{
                if(!lover){
                    lover=names[Math.floor(Math.random()*names.length)];
                    heartEffect();
                    showStatus("😊 Chính thức hết độc thân");
                }else{
                    showStatus("❤️ Đang yêu "+lover);
                }
            }
        }
    ];

    actions.forEach(a=>{
        let btn=document.createElement("button");
        btn.innerText=a.text;
        btn.onclick=()=>next(a.action);
        div.appendChild(btn);
    });
}

/* END GAME */
function endGame(text){
    gameOver=true;
    updateUI(text);
    document.getElementById("buttons").innerHTML =
        '<button onclick="location.reload()">Chơi lại</button>';
}

/* ENDING */
function ending(){
    let total=money+savings+investment;

    let endings=[];

    if(total>50000 && lover) endings.push("👑 Vua xuyên không - tiền không thiếu tình không vơi");
    if(total>50000 && !lover) endings.push("💰 Fuba cô độc-đếm tiền mỏi tay, không ai nắm tay");
    if(total>20000 && lover) endings.push("💖 Đời không plot twist");
    if(total>20000 && !lover) endings.push("😐 Bình bình sống với 50 con mèo cuối đời");
    if(total<10000 && lover) endings.push("❤️ Mụt túp lều tranh hai trái tim vàng");
    if(total<10000 && !lover) endings.push("😢 Thất bại toàn tập-chơi j ngu vại");

    let result=endings[Math.floor(Math.random()*endings.length)];
    endGame(result);
}

/* INIT */
updateUI();
renderButtons();
</script>
