<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Game Cuộc Đời Tài Chính</title>
<style>
    body {
        font-family: Arial;
        background: #111;
        color: #fff;
        text-align: center;
        padding: 20px;
    }
    .box {
        background: #222;
        padding: 20px;
        border-radius: 10px;
        max-width: 600px;
        margin: auto;
    }
    button {
        padding: 10px;
        margin: 5px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    button:hover {
        opacity: 0.8;
    }
</style>
</head>

<body>

<div class="box">
    <h1>💰 Game Cuộc Đời</h1>

    <p id="stats"></p>
    <p id="story"></p>

    <div id="choices"></div>
</div>

<script>
let age = 18;
let iq = 100;
let money = 1000;
let savings = 0;
let investment = 0;
let job = "Thất nghiệp";
let love = false;

function updateStats() {
    document.getElementById("stats").innerHTML =
        `Tuổi: ${age} | IQ: ${iq} | Nghề: ${job} <br>
         Tiền: ${money}$ | Tiết kiệm: ${savings}$ | Đầu tư: ${investment}$ <br>
         Người yêu: ${love ? "Có" : "Chưa có"}`;
}

function setStory(text, options) {
    document.getElementById("story").innerText = text;
    let choicesDiv = document.getElementById("choices");
    choicesDiv.innerHTML = "";

    options.forEach(opt => {
        let btn = document.createElement("button");
        btn.innerText = opt.text;
        btn.onclick = opt.action;
        choicesDiv.appendChild(btn);
    });
}

function nextYear() {
    age++;

    // drama random
    let rand = Math.random();

    if (rand < 0.2) {
        setStory("🔥 Bạn bị lừa đầu tư mất tiền!", [
            { text: "Tiếp tục", action: () => {
                investment = Math.max(0, investment - 500);
                nextYear();
            }}
        ]);
        return;
    }

    if (rand < 0.4 && love) {
        setStory("💔 Người yêu chia tay vì bạn quá bận kiếm tiền!", [
            { text: "Đau lòng...", action: () => {
                love = false;
                nextYear();
            }}
        ]);
        return;
    }

    if (age >= 50) {
        ending();
        return;
    }

    mainEvent();
}

function mainEvent() {
    updateStats();

    setStory("Bạn muốn làm gì?", [
        {
            text: "📚 Học tăng IQ",
            action: () => {
                iq += 5;
                money -= 200;
                nextYear();
            }
        },
        {
            text: "💼 Đi làm",
            action: () => {
                job = "Nhân viên";
                money += 500 + iq;
                nextYear();
            }
        },
        {
            text: "🏦 Gửi tiết kiệm",
            action: () => {
                savings += 300;
                money -= 300;
                nextYear();
            }
        },
        {
            text: "📈 Đầu tư",
            action: () => {
                investment += 500;
                money -= 500;
                if (Math.random() > 0.5) {
                    investment += 1000;
                }
                nextYear();
            }
        },
        {
            text: "❤️ Tìm người yêu",
            action: () => {
                if (!love && Math.random() > 0.5) {
                    love = true;
                    alert("Bạn đã có người yêu!");
                } else {
                    alert("Thất bại...");
                }
                nextYear();
            }
        }
    ]);
}

function ending() {
    let total = money + savings + investment;

    let result = "";

    if (total > 20000 && love) {
        result = "🏆 KẾT THÚC TỐT: Giàu có và hạnh phúc bên người yêu!";
    }
    else if (total > 20000) {
        result = "💰 KẾT THÚC: Bạn rất giàu nhưng cô đơn.";
    }
    else if (love) {
        result = "❤️ KẾT THÚC: Nghèo nhưng có tình yêu.";
    }
    else {
        result = "😢 KẾT THÚC TỆ: Nghèo và cô đơn.";
    }

    document.getElementById("story").innerText = result;
    document.getElementById("choices").innerHTML =
        `<button onclick="location.reload()">Chơi lại</button>`;
}

mainEvent();
</script>

</body>
</html>
