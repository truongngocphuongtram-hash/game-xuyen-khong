<!DOCTYPE html>
<html>
<head>
    <title>Game Xuyên Không PRO MAX</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
            text-align: center;
            padding: 20px;
        }

        #box {
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 15px;
            width: 450px;
            margin: auto;
        }

        button {
            padding: 10px;
            margin: 6px;
            border: none;
            border-radius: 10px;
            background: #00c6ff;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0072ff;
            color: white;
        }
    </style>
</head>

<body>

<h1>🌌 Xuyên Không: Làm Lại Cuộc Đời</h1>

<div id="box">
    <p id="story">Bạn quay về năm 18 tuổi...</p>

    <p>📅 Tuổi: <span id="age">18</span></p>
    <p>💰 Tiền: <span id="money">1000000</span></p>
    <p>🧠 IQ: <span id="iq">50</span></p>
    <p>❤️ Hạnh phúc: <span id="happy">50</span></p>
    <p>💖 Tình yêu: <span id="love">0</span></p>
    <p>💼 Nghề: <span id="job">Thất nghiệp</span></p>
    <p>👩 Người yêu: <span id="lover">Chưa có</span></p>

    <div id="choices">
        <button onclick="hoc()">📚 Học</button>
        <button onclick="lamviec()">💼 Làm việc</button>
        <button onclick="dautu()">💸 Đầu tư</button>
        <button onclick="henho()">💖 Hẹn hò</button>
        <button onclick="nghi()">😴 Nghỉ</button>
    </div>
</div>

<script>
let age = 18;
let money = 1000000;
let iq = 50;
let happy = 50;
let love = 0;
let job = "Thất nghiệp";
let lover = "Chưa có";

let loverNames = ["Linh", "Vy", "An", "Hân", "My"];

function update(){
    document.getElementById("age").innerText = age;
    document.getElementById("money").innerText = money;
    document.getElementById("iq").innerText = iq;
    document.getElementById("happy").innerText = happy;
    document.getElementById("love").innerText = love;
    document.getElementById("job").innerText = job;
    document.getElementById("lover").innerText = lover;

    // unlock nghề
    if(iq >= 80 && job == "Thất nghiệp"){
        job = "Nhân viên";
        story("🎉 Bạn có việc làm!");
    }

    if(iq >= 120 && money > 5000000){
        job = "Doanh nhân";
    }

    // random drama
    randomEvent();

    // ending
    if(money <= 0){
        end("💀 Bạn phá sản!");
    }

    if(happy <= 0){
        end("😢 Bạn trầm cảm vì cuộc sống!");
    }

    if(age >= 40){
        if(money >= 30000000){
            end("👑 Bạn thành công rực rỡ!");
        } else {
            end("😞 Bạn sống bình thường, không có gì nổi bật...");
        }
    }

    if(love >= 100){
        end("💖 Bạn có tình yêu trọn vẹn!");
    }
}

function story(text){
    document.getElementById("story").innerText = text;
}

function end(text){
    story(text);
    document.getElementById("choices").innerHTML = "<button onclick='location.reload()'>🔄 Chơi lại</button>";
}

// hành động
function hoc(){
    iq += 10;
    happy -= 5;
    age++;
    story("Bạn học rất chăm!");
    update();
}

function lamviec(){
    if(job == "Thất nghiệp"){
        story("Bạn chưa có việc!");
        return;
    }
    money += 700000;
    happy -= 5;
    age++;
    story("Bạn đi làm kiếm tiền!");
    update();
}

function dautu(){
    let r = Math.random();
    if(r > 0.6){
        money += 1500000;
        story("📈 Đầu tư thắng lớn!");
    } else {
        money -= 800000;
        story("📉 Thua lỗ!");
    }
    age++;
    update();
}

function henho(){
    if(lover == "Chưa có"){
        lover = loverNames[Math.floor(Math.random()*loverNames.length)];
        story("💘 Bạn gặp " + lover + "!");
    } else {
        love += 15;
        happy += 10;
        money -= 200000;
        story("❤️ Hẹn hò với " + lover);
    }
    age++;
    update();
}

function nghi(){
    happy += 10;
    age++;
    story("Bạn nghỉ ngơi 😴");
    update();
}

// drama random
function randomEvent(){
    let r = Math.random();

    if(r < 0.1){
        money += 2000000;
        story("🎉 Bạn trúng số!");
    }

    if(r > 0.9){
        money -= 1000000;
        story("💸 Bạn bị lừa tiền!");
    }

    if(r > 0.7 && lover != "Chưa có"){
        love -= 20;
        story("💔 Bạn cãi nhau với " + lover);
    }
}
</script>

</body>
</html>
