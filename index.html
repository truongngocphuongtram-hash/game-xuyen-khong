<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Game Xuyên Không</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564") center/cover;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* panel */
.panel {
    width: 420px;
    background: #dcdcf5;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
}

/* status chạy */
#status {
    height: 25px;
    overflow: hidden;
    font-size: 14px;
    margin-bottom: 10px;
}

.statusText {
    animation: slide 2.5s linear;
}

@keyframes slide {
    0% { transform: translateY(20px); opacity: 0 }
    20% { opacity: 1 }
    80% { opacity: 1 }
    100% { transform: translateY(-20px); opacity: 0 }
}

/* drama */
#drama {
    font-style: italic;
    height: 30px;
}

/* stats */
#stats {
    text-align: left;
    line-height: 1.6;
}

/* buttons */
button {
    background: #cbb7ff;
    border: none;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    cursor: pointer;
}

/* EFFECT */
#effect {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

/* tiền */
.money {
    position: absolute;
    font-size: 40px;
    animation: moneyFly 2.5s ease-out forwards;
}

@keyframes moneyFly {
    0% { transform: scale(1) translateY(0); opacity: 1 }
    100% { transform: scale(2) translateY(-150px); opacity: 0 }
}

/* tim */
.heart {
    position: absolute;
    font-size: 60px;
    animation: heartBoom 2.5s ease-out forwards;
}

@keyframes heartBoom {
    0% { transform: scale(0.5); opacity: 1 }
    50% { transform: scale(2) }
    100% { transform: scale(1.2); opacity: 0 }
}
</style>

</head>

<body>

<div class="panel">
    <h2>Game Xuyên Không</h2>

    <div id="status"></div>
    <div id="drama"></div>

    <div id="stats"></div>

    <div id="buttons"></div>
</div>

<div id="effect"></div>

<script>
let age = 18;
let iq = 100;
let money = 1000;
let savings = 0;
let investment = 0;
let job = "Thất nghiệp";

let lover = null;

const names = ["Phương Trâm","Bích Tuyền","Ngọc Nhi","Anh Thư","Bảo Khang"];

/* STATUS */
function showStatus(text) {
    let div = document.getElementById("status");
    let el = document.createElement("div");
    el.className = "statusText";
    el.innerText = text;

    div.innerHTML = "";
    div.appendChild(el);
}

/* EFFECT */
function moneyEffect() {
    let e = document.createElement("div");
    e.className = "money";
    e.innerText = "💸";
    e.style.left = "50%";
    e.style.top = "60%";
    document.getElementById("effect").appendChild(e);
    setTimeout(()=>e.remove(),2500);
}

function heartEffect() {
    let e = document.createElement("div");
    e.className = "heart";
    e.innerText = "❤️";
    e.style.left = "50%";
    e.style.top = "50%";
    document.getElementById("effect").appendChild(e);
    setTimeout(()=>e.remove(),2500);
}

/* UI */
function updateUI(drama="") {
    document.getElementById("drama").innerText = drama;

    document.getElementById("stats").innerHTML = `
    🎂 ${age} tuổi<br>
    🧠 IQ: ${iq}<br>
    💼 ${job}<br>
    💰 ${money}$<br>
    🏦 ${savings}$<br>
    📈 ${investment}$<br>
    ❤️ ${lover ? lover : "Chưa có"}
    `;
}

/* BUTTON */
function setButtons(arr) {
    let div = document.getElementById("buttons");
    div.innerHTML = "";

    arr.forEach(b=>{
        let btn=document.createElement("button");
        btn.innerText=b.text;
        btn.onclick=b.action;
        div.appendChild(btn);
    });
}

/* tuổi random */
function growAge() {
    age += Math.floor(Math.random()*4)+2; // 2-5
}

/* MAIN */
function game() {
    updateUI();

    setButtons([
        {
            text:"📚 Học",
            action:()=>{
                iq+=5;
                money-=200;
                growAge();
                showStatus("📚 Bạn đang học chăm chỉ");
                game();
            }
        },
        {
            text:"💼 Làm",
            action:()=>{
                job="Nhân viên";
                money+=400+iq;
                growAge();
                showStatus("💼 Bạn đi làm kiếm tiền");
                game();
            }
        },
        {
            text:"🏦 Tiết kiệm",
            action:()=>{
                savings+=300;
                money-=300;
                growAge();
                showStatus("🏦 Bạn đang tiết kiệm");
                game();
            }
        },
        {
            text:"📈 Đầu tư",
            action:()=>{
                money-=500;
                growAge();

                if(Math.random()>0.5){
                    investment+=1200;
                    showStatus("💰 Bạn đầu tư thắng lớn!");
                }else{
                    investment+=200;
                    moneyEffect();
                    showStatus("💸 Đầu tư thất bại!");
                }
                game();
            }
        },
        {
            text:"❤️ Hẹn hò",
            action:()=>{
                growAge();

                if(!lover){
                    lover=names[Math.floor(Math.random()*names.length)];
                    heartEffect();
                    showStatus("😊 Bạn đang hẹn hò với "+lover);
                }else{
                    showStatus("❤️ Bạn vẫn yêu "+lover);
                }
                game();
            }
        }
    ]);

    if(age>=45) ending();
}

/* END */
function ending(){
    let total=money+savings+investment;
    let text="";

    if(total>30000 && lover){
        text="🏆 Viên mãn";
    }else if(total>30000){
        text="💰 Giàu nhưng cô đơn";
    }else if(lover){
        text="❤️ Bình yên";
    }else{
        text="😢 Thất bại";
    }

    updateUI(text);
    document.getElementById("buttons").innerHTML=
        '<button onclick="location.reload()">Chơi lại</button>';
}

game();
</script>

</body>
</html>
