<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Game Xuyên Không</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564") center/cover;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.panel {
    width: 420px;
    background: #dcdcf5;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
}

#intro { display: block; }
#game { display: none; }

#status {
    height: 25px;
    overflow: hidden;
    position: relative;
}

.statusText {
    position: absolute;
    width: 100%;
    animation: slide 2.5s linear;
}

@keyframes slide {
    0% { transform: translateY(20px); opacity: 0 }
    20% { opacity: 1 }
    80% { opacity: 1 }
    100% { transform: translateY(-20px); opacity: 0 }
}

#drama {
    font-style: italic;
    height: 25px;
}

#stats {
    text-align: left;
}

button {
    background: #cbb7ff;
    border: none;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    cursor: pointer;
}

#effect {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.money {
    position: absolute;
    left: 50%;
    top: 60%;
    transform: translate(-50%, -50%);
    font-size: 50px;
    animation: moneyFly 2.5s ease-out forwards;
}

@keyframes moneyFly {
    0% { transform: translate(-50%, -50%) scale(1); opacity: 1 }
    100% { transform: translate(-50%, -200px) scale(2); opacity: 0 }
}

.heart {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-size: 70px;
    animation: heartBoom 2.5s ease-out forwards;
}

@keyframes heartBoom {
    0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1 }
    50% { transform: translate(-50%, -50%) scale(2) }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 0 }
}
</style>
</head>

<body>

<div class="panel" id="intro">
    <h2>Game Xuyên Không</h2>
    <p>
        Bạn xuyên không sang thế giới khác...<br><br>
        Bắt đầu lại mọi thứ từ con số 0 🌀<br>
        Tiền bạc - tình yêu - drama đang chờ đón bạn 💔<br><br>
        Liệu bạn sẽ trở thành ai?
    </p>
    <button onclick="startGame()">✨ Xuyên không</button>
</div>

<div class="panel" id="game">
    <h2>Game Xuyên Không</h2>
    <div id="status"></div>
    <div id="drama"></div>
    <div id="stats"></div>
    <div id="buttons"></div>
</div>

<div id="effect"></div>

<script>
let age = 18;
let iq = 50;
let money = 1000;
let savings = 0;
let investment = 0;
let job = "Ăn bám bố mẹ";
let lover = null;
let gameOver = false;

const names = ["Phương Trâm","Bích Tuyền","Ngọc Nhi","Anh Thư","Bảo Khang"];

/* START */
function startGame(){
    intro.style.display="none";
    game.style.display="block";
}

/* STATUS */
function showStatus(text){
    let el=document.createElement("div");
    el.className="statusText";
    el.innerText=text;
    status.appendChild(el);
    setTimeout(()=>el.remove(),2500);
}

/* EFFECT */
function moneyEffect(){
    let e=document.createElement("div");
    e.className="money";
    e.innerText="💸";
    effect.appendChild(e);
    setTimeout(()=>e.remove(),2500);
}

function heartEffect(){
    let e=document.createElement("div");
    e.className="heart";
    e.innerText="❤️";
    effect.appendChild(e);
    setTimeout(()=>e.remove(),2500);
}

/* DRAMA RANDOM */
function randomDrama(){
    let events=[
        "💔 trở thành con trâu sừng dài nhất thế giới",
        "🎁 Trúng thưởng-may mắn đến",
        "😷 Bệnh tật",
        "🔥 nhát dao từ đồng nghiệp"
    ];

    let e=events[Math.floor(Math.random()*events.length)];

    if(e.includes("Trúng")) money+=2000;
    if(e.includes("Bệnh")) money-=500;

    return e;
}

/* UI */
function updateUI(drama=""){
    document.getElementById("drama").innerText=drama;

    stats.innerHTML=`
    🎂 ${age} tuổi<br>
    🧠 ${iq}<br>
    💼 ${job}<br>
    💰 ${money}$<br>
    🏦 ${savings}$<br>
    📈 ${investment}$<br>
    ❤️ ${lover ? lover : "Sói hoang cô độc"}
    <br><progress value="${age}" max="45"></progress>
    `;
}

/* AGE */
function growAge(){
    age += Math.floor(Math.random()*4)+2;
}

/* NEXT */
function next(action){
    if(gameOver) return;

    action();
    growAge();

    let drama=randomDrama();
    updateUI(drama);
    renderButtons();

    if(money<0){
        endGame("💀 Phá sản");
        return;
    }

    if(age>=45){
        ending();
    }
}

/* BUTTON */
function renderButtons(){
    buttons.innerHTML="";

    const actions=[
        {
            text:"📚 Học",
            action:()=>{
                iq+=5;
                money-=200;
                showStatus("📚 Đang trong ngôi trg hạnh phúc");
            }
        },
        {
            text:"💼 Làm",
            action:()=>{
                money+=400+iq;
                if(iq>180) job="🧠 Thiên tài";
                else if(iq>140) job="💻 Lập trình viên";
                else job="👷 Công nhân";
                showStatus("💼 Làm trâu làm ngựa");
            }
        },
        {
            text:"🏦 Tiết kiệm",
            action:()=>{
                savings+=300;
                money-=300;
                showStatus("🏦 Gửi tư bản");
            }
        },
        {
            text:"📈 Đầu tư",
            action:()=>{
                money-=500;
                if(Math.random()>0.5){
                    investment+=1500;
                    showStatus("💰 Lãi lớn!");
                }else{
                    investment-=300;
                    moneyEffect();
                    showStatus("💸 Lỗ nặng rùi cưng!");
                }
            }
        },
        {
            text:"❤️ Hẹn hò",
            action:()=>{
                if(!lover){
                    lover=names[Math.floor(Math.random()*names.length)];
                    heartEffect();
                    showStatus("😊 Có người yêu");
                }else{
                    showStatus("❤️ Đang yêu "+lover);
                }
            }
        }
    ];

    actions.forEach(a=>{
        let btn=document.createElement("button");
        btn.innerText=a.text;
        btn.onclick=()=>next(a.action);
        buttons.appendChild(btn);
    });
}

/* END GAME */
function endGame(text){
    gameOver=true;
    updateUI(text);
    buttons.innerHTML='<button onclick="location.reload()">Chơi lại</button>';
}

/* ENDING - ĐA DẠNG */
function ending(){
    let total=money+savings+investment;

    let endings=[];

    if(total>50000 && lover) endings.push("👑 Vua xuyên không - tiền không thiếu tình không vơi");
    if(total>50000 && !lover) endings.push("💰 Fuba cô độc-đếm tiền mỏi tay, không ai nắm tay");
    if(total>20000 && lover) endings.push("💖 Đời không plot twist");
    if(total>20000 && !lover) endings.push("😐 Bình bình đến cuối đời");
    if(total<10000 && lover) endings.push("❤️ Mụt túp lều tranh hai trái tim vàng");
    if(total<10000 && !lover) endings.push("😢 Thất bại toàn tập-chơi gì ngu vại bạn");

    // random trong các kết hợp phù hợp
    let result=endings[Math.floor(Math.random()*endings.length)];

    endGame(result);
}

/* INIT */
updateUI();
renderButtons();
</script>

</body>
</html>
