<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Game Xuyên Không</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    color: #222;

    /* nền galaxy */
    background: url("https://i.imgur.com/9QZ7z9G.jpg") no-repeat center/cover;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* bảng chính */
.panel {
    width: 420px;
    background: #cfcfe6;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* tiêu đề */
h1 {
    text-align: center;
    font-weight: 500;
}

/* drama */
#drama {
    text-align: center;
    font-style: italic;
    color: #444;
    min-height: 40px;
}

/* chỉ số */
#stats {
    text-align: left;
    margin-top: 10px;
    line-height: 1.6;
}

/* nút */
.buttons {
    margin-top: 20px;
    text-align: center;
}

button {
    background: #d8c6ff;
    border: none;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #c2a8ff;
}
</style>

</head>

<body>

<div class="panel">
    <h1>Game Xuyên Không</h1>

    <div id="drama"></div>

    <div id="stats"></div>

    <div class="buttons" id="buttons"></div>
</div>

<script>
let age = 18;
let iq = 100;
let money = 1000;
let savings = 0;
let investment = 0;
let job = "Thất nghiệp";

let lover = null;
let cheated = false;

const names = ["Phương Trâm", "Bích Tuyền", "Ngọc Nhi", "Anh Thư", "Bảo Khang"];

function randomLover() {
    return names[Math.floor(Math.random() * names.length)];
}

function updateUI(dramaText="") {
    document.getElementById("drama").innerText = dramaText;

    document.getElementById("stats").innerHTML = `
    🎂 Tuổi: ${age} <br>
    🧠 IQ: ${iq} <br>
    💼 Nghề: ${job} <br>
    💰 Tiền: ${money}$ <br>
    🏦 Tiết kiệm: ${savings}$ <br>
    📈 Đầu tư: ${investment}$ <br>
    ❤️ Người yêu: ${lover ? lover : "Chưa có"}
    `;
}

function setButtons(list) {
    let div = document.getElementById("buttons");
    div.innerHTML = "";
    list.forEach(b => {
        let btn = document.createElement("button");
        btn.innerText = b.text;
        btn.onclick = b.action;
        div.appendChild(btn);
    });
}

function nextYear() {
    age++;

    // drama ngẫu nhiên
    let rand = Math.random();

    if (rand < 0.2) {
        investment = Math.max(0, investment - 500);
        updateUI("💥 Bạn bị lừa đầu tư!");
        return mainMenu();
    }

    if (rand < 0.4 && lover) {
        cheated = true;
        lover = null;
        updateUI("💔 Bạn bị cắm sừng và chia tay!");
        return mainMenu();
    }

    if (age >= 45) {
        return ending();
    }

    mainMenu();
}

function mainMenu() {
    updateUI();

    setButtons([
        {
            text: "📚 Học",
            action: () => {
                iq += 5;
                money -= 200;
                nextYear();
            }
        },
        {
            text: "💼 Đi làm",
            action: () => {
                job = "Nhân viên";
                money += 400 + iq;
                nextYear();
            }
        },
        {
            text: "🏦 Tiết kiệm",
            action: () => {
                savings += 300;
                money -= 300;
                nextYear();
            }
        },
        {
            text: "📈 Đầu tư",
            action: () => {
                money -= 500;
                if (Math.random() > 0.5) {
                    investment += 1000;
                } else {
                    investment += 200;
                }
                nextYear();
            }
        },
        {
            text: "❤️ Hẹn hò",
            action: () => {
                if (!lover) {
                    lover = randomLover();
                    cheated = false;
                    updateUI("💘 Bạn bắt đầu hẹn hò với " + lover);
                } else {
                    updateUI("💑 Bạn đang yêu " + lover);
                }
                mainMenu();
            }
        }
    ]);
}

function ending() {
    let total = money + savings + investment;
    let end = "";

    if (total > 30000 && lover) {
        end = "🏆 Kết thúc hoàn hảo: Giàu có + tình yêu!";
    }
    else if (total > 30000) {
        end = "💰 Kết thúc: Tỷ phú cô đơn.";
    }
    else if (lover && cheated) {
        end = "💔 Kết thúc drama: Yêu nhưng toàn bị phản bội.";
    }
    else if (lover) {
        end = "❤️ Kết thúc: Bình thường nhưng hạnh phúc.";
    }
    else {
        end = "😢 Kết thúc tệ: Nghèo và cô đơn.";
    }

    updateUI(end);

    setButtons([
        {
            text: "🔄 Chơi lại",
            action: () => location.reload()
        }
    ]);
}

mainMenu();
</script>

</body>
</html>
