<!DOCTYPE html>
<html>
<head>
    <title>Game Xuyên Không PRO MAX</title>

    <style>
        body{
            font-family: Arial;
            background: linear-gradient(to right,#141e30,#243b55);
            color:white;
            text-align:center;
            padding:20px;
        }

        #box{
            background:rgba(0,0,0,0.7);
            padding:20px;
            border-radius:15px;
            width:450px;
            margin:auto;
        }

        button{
            padding:10px;
            margin:6px;
            border:none;
            border-radius:10px;
            background:#00c6ff;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#0072ff;
            color:white;
        }

        #effect{
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            display: none;
            z-index: 999;
            animation: pop 1s ease;
        }

        @keyframes pop{
            0%{transform: translate(-50%,-50%) scale(0.5);}
            100%{transform: translate(-50%,-50%) scale(1.3);}
        }

        #luckBtn{
            margin-top:10px;
            background: gold;
            color:black;
        }
    </style>
</head>

<body>

<h1>🌌 Xuyên Không: Làm Lại Cuộc Đời</h1>

<div id="box">
    <p id="story">Bạn quay về năm 18 tuổi...</p>

    <p>📅 Tuổi: <span id="age">18</span></p>
    <p>💰 Tiền: <span id="money">1000000</span></p>
    <p>🧠 IQ: <span id="iq">50</span></p>
    <p>😄 Hạnh phúc: <span id="happy">50</span></p>
    <p>❤️ Tình yêu: <span id="love">0</span></p>
    <p>💼 Nghề: <span id="job">Thất nghiệp</span></p>
    <p>👩 Người yêu: <span id="lover">Chưa có</span></p>

    <div id="choices">
        <button onclick="hoc()">📚 Học</button>
        <button onclick="lamviec()">💼 Làm việc</button>
        <button onclick="dautu()">💸 Đầu tư</button>
        <button onclick="henho()">💖 Hẹn hò</button>
        <button onclick="nghi()">😴 Nghỉ</button>
    </div>

    <button id="luckBtn" onclick="mayMan()">🍀 May mắn (1 lần)</button>
</div>

<div id="effect"></div>

<script>
let age = 18;
let money = 1000000;
let iq = 50;
let happy = 50;
let love = 0;
let job = "Thất nghiệp";
let lover = "Chưa có";
let debt = 0;
let usedLuck = false;

let loverNames = ["Phương Trâm","Ngọc Nhi","Anh Thư","bảo Khang","Bích Tuyền"];

// update UI
function update(){
    document.getElementById("age").innerText = age;
    document.getElementById("money").innerText = money;
    document.getElementById("iq").innerText = iq;
    document.getElementById("happy").innerText = happy;
    document.getElementById("love").innerText = love;
    document.getElementById("job").innerText = job;
    document.getElementById("lover").innerText = lover;

    checkJob();
    randomEvent();
    checkEnding();
}

// hiển thị story
function story(text){
    document.getElementById("story").innerText = text;
}

// hiệu ứng giữa màn hình
function showEffect(text){
    let e = document.getElementById("effect");
    e.innerText = text;
    e.style.display = "block";

    setTimeout(()=>{
        e.style.display = "none";
    },1000);
}

// nghề nghiệp
function checkJob(){
    if(iq >= 70) job = "Freelancer";
    if(iq >= 100 && money > 3000000) job = "Nhân viên";
    if(iq >= 130 && money > 10000000) job = "Manager";
    if(iq >= 160 && money > 30000000) job = "CEO";
}

// drama
function randomEvent(){
    let r = Math.random();

    if(r < 0.1){
        showEffect("🎆🎆🎆");
        money += 3000000;
        story("🎉 Bạn trúng cơ hội lớn!");
    }
    else if(r < 0.2){
        showEffect("💸💸💸");
        money -= 2000000;
        story("💸 Bạn bị lừa!");
    }
    else if(r < 0.3){
        showEffect("⚠️⚠️⚠️");
        debt += 2000000;
        story("⚠️ Bạn dính nợ!");
    }

    if(lover != "Chưa có"){
        let t = Math.random();

        if(t < 0.1){
            love -= 30;
            story("💔 " + lover + " nghi ngờ bạn!");
        }
        else if(t < 0.2){
            lover = "Chưa có";
            love = 0;
            story("💀 Bạn bị chia tay!");
        }
        else if(t < 0.3){
            love += 20;
            story("💖 Tình cảm tăng mạnh!");
        }
    }
}

// ending
function checkEnding(){
    if(money <= -5000000){
        end("💀 Bạn phá sản!");
    }

    if(love >= 120){
        end("💍 Bạn kết hôn!");
    }

    if(age >= 45){
        if(money >= 50000000){
            end("👑 Bạn thành đại gia!");
        }else{
            end("😞 Cuộc đời bình thường...");
        }
    }
}

// kết thúc
function end(text){
    story(text);
    document.getElementById("choices").innerHTML =
        "<button onclick='location.reload()'>🔄 Chơi lại</button>";
}

// hành động
function hoc(){
    iq += 10;
    happy -= 5;
    age++;
    story("📚 Bạn học chăm!");
    update();
}

function lamviec(){
    if(job == "Thất nghiệp"){
        story("Bạn chưa có việc!");
        return;
    }

    let salary = 500000;

    if(job == "Freelancer") salary = 800000;
    if(job == "Nhân viên") salary = 1500000;
    if(job == "Manager") salary = 3000000;
    if(job == "CEO") salary = 7000000;

    money += salary;
    happy -= 5;
    age++;

    story("💼 Bạn đi làm!");
    update();
}

function dautu(){
    let r = Math.random();

    if(r > 0.6){
        money += 4000000;
        story("📈 Đầu tư thắng!");
    } else {
        money -= 2000000;
        story("📉 Lỗ!");
    }

    age++;
    update();
}

function henho(){
    if(lover == "Chưa có"){
        lover = loverNames[Math.floor(Math.random()*loverNames.length)];
        story("💘 Bạn gặp " + lover);
    } else {
        love += 20;
        money -= 300000;
        happy += 10;
        story("❤️ Đi chơi với " + lover);
    }

    age++;
    update();
}

function nghi(){
    happy += 10;
    age++;
    story("😴 Nghỉ ngơi");
    update();
}

// may mắn 1 lần
function mayMan(){
    if(usedLuck){
        alert("Bạn đã dùng rồi!");
        return;
    }

    usedLuck = true;

    let r = Math.random();

    if(r < 0.25){
        money += 3000000;
        showEffect("💰 +TIỀN");
    }
    else if(r < 0.5){
        iq += 30;
        showEffect("🧠 +IQ");
    }
    else if(r < 0.75){
        happy += 30;
        showEffect("😄 +HP");
    }
    else{
        love += 30;
        showEffect("❤️ +LOVE");
    }

    document.getElementById("luckBtn").disabled = true;

    update();
}
</script>

</body>
</html>
