<!DOCTYPE html>  <html lang="vi">  
<head>  
<meta charset="UTF-8">  
<title>Game Xuyên Không</title>  <style>  
body {  
    margin: 0;  
    font-family: sans-serif;  
    background: url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564") center/cover;  
    height: 100vh;  
    display: flex;  
    justify-content: center;  
    align-items: center;  
}  
  
.panel {  
    width: 420px;  
    background: #dcdcf5;  
    padding: 20px;  
    border-radius: 20px;  
    text-align: center;  
}  
  
#intro { display: block; }  
#game { display: none; }  
  
#status {  
    height: 25px;  
    overflow: hidden;  
    position: relative;  
}  
  
.statusText {  
    position: absolute;  
    width: 100%;  
    animation: slide 2.5s linear;  
}  
  
@keyframes slide {  
    0% { transform: translateY(20px); opacity: 0 }  
    20% { opacity: 1 }  
    80% { opacity: 1 }  
    100% { transform: translateY(-20px); opacity: 0 }  
}  
  
#drama {  
    font-style: italic;  
    height: 25px;  
}  
  
#stats {  
    text-align: left;  
}  
  
button {  
    background: #cbb7ff;  
    border: none;  
    padding: 10px;  
    margin: 5px;  
    border-radius: 10px;  
    cursor: pointer;  
}  
  
#effect {  
    position: fixed;  
    width: 100%;  
    height: 100%;  
    pointer-events: none;  
}  
  
.money {  
    position: absolute;  
    left: 50%;  
    top: 60%;  
    transform: translate(-50%, -50%);  
    font-size: 50px;  
    animation: moneyFly 2.5s ease-out forwards;  
}  
  
@keyframes moneyFly {  
    0% { transform: translate(-50%, -50%) scale(1); opacity: 1 }  
    100% { transform: translate(-50%, -200px) scale(2); opacity: 0 }  
}  
  
.heart {  
    position: absolute;  
    left: 50%;  
    top: 50%;  
    transform: translate(-50%, -50%);  
    font-size: 70px;  
    animation: heartBoom 2.5s ease-out forwards;  
}  
  
@keyframes heartBoom {  
    0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1 }  
    50% { transform: translate(-50%, -50%) scale(2) }  
    100% { transform: translate(-50%, -50%) scale(1); opacity: 0 }  
}  
</style>  </head>  <body>  <div class="panel" id="intro">  
    <h2>Game Xuyên Không</h2>  
    <p>  
        Bạn xuyên không sang thế giới khác...<br><br>  
        Bắt đầu từ con số 0 🌀<br>  
        Tiền bạc - tình yêu - drama đang chờ bạn 💔<br><br>  
        Bạn sẽ trở thành ai?  
    </p>  
    <button onclick="startGame()">✨ Xuyên không</button>  
</div>  <div class="panel" id="game">  
    <h2>Game Xuyên Không</h2>  
    <div id="status"></div>  
    <div id="drama"></div>  
    <div id="stats"></div>  
    <div id="buttons"></div>  
</div>  <div id="effect"></div>
    <script>
let age = 18;
let iq = 100;
let money = 1500;
let savings = 0;
let investment = 0;
let job = "Ăn bám bố mẹ";
let lover = null;
let gameOver = false;

let turn = 0;

// ✅ thêm biến còn thiếu
let hasJob = false;
let canChangeJob = true;

const names = ["Phương Trâm","Bích Tuyền","Ngọc Nhi","Anh Thư","Bảo Khang"];

/* START */
function startGame(){
    document.getElementById("intro").style.display="none";
    document.getElementById("game").style.display="block";
    updateUI();
}

/* STATUS */
function showStatus(text){
    let el=document.createElement("div");
    el.className="statusText";
    el.innerText=text;
    document.getElementById("status").appendChild(el);
    setTimeout(()=>el.remove(),2500);
}

/* EFFECT */
function moneyEffect(){
    let e=document.createElement("div");
    e.className="money";
    e.innerText="💸";
    document.getElementById("effect").appendChild(e);
    setTimeout(()=>e.remove(),2500);
}

function heartEffect(){
    let e=document.createElement("div");
    e.className="heart";
    e.innerText="❤️";
    document.getElementById("effect").appendChild(e);
    setTimeout(()=>e.remove(),2500);
}

/* DRAMA */
function randomDrama(){
    let events = [];

    events.push("🎁 Trúng thưởng-may mắn đến");
    events.push("😷 Bệnh tật");
    events.push("♠️ Dính vào vòng lao lý ♥️");

    if(lover){
        events.push("💔 Bị cắm sừng-ôi kìa con trâu");
    }

    if(job !== "Ăn bám bố mẹ"){
        events.push("🔥 +1 nhát dao từ đồng nghiệp");
    }

    let e = events[Math.floor(Math.random()*events.length)];

    if(e.includes("Trúng")) money += 2000;
    if(e.includes("Bệnh")) money -= 500;
    if(e.includes("Dính")) money -= 1000;

    return e;
}

/* UI */
function updateUI(drama=""){
    let dramaEl = document.getElementById("drama");
    let statsEl = document.getElementById("stats");

    if(!dramaEl || !statsEl) return;

    dramaEl.innerText=drama;

    statsEl.innerHTML=`
    🎂 ${age} tuổi<br>
    🧠 ${iq}<br>
    💼 ${job}<br>
    💰 ${money}$<br>
    🏦 ${savings}$<br>
    📈 ${investment}$<br>
    ❤️ ${lover ? lover : "Sói hoang cô độc"}
    <br><progress value="${age}" max="60"></progress>
    `;
}

/* AGE */
function growAge(){
    age += 2;
}

/* NEXT */
function next(action){
    if(gameOver) return;

    action();
    growAge();
    turn++;

    let drama = "";

    if(turn > 3){
        if(Math.random() < 0.3){
            drama = randomDrama();
        }
    }

    updateUI(drama);
    renderButtons();

    if(money<0){
        endGame("💀 Tán gia bại sản");
        return;
    }

    if(age>=45){
        ending();
    }
}

/* BUTTON */
function renderButtons(){
    let div = document.getElementById("buttons");
    if(!div) return;

    div.innerHTML="";

    const realActions = [

        {
            text:"📚 Học",
            action:()=>{
                iq+=5;
                money-=200;
                showStatus("📚 Đang trog ngôi trg hạnh phúc");
            }
        },

        {
            text:"💼 Làm",
            action:()=>{

                if(!hasJob){
                    if(iq > 130) {
                        job = "🧠 Thiên tài-CEO";
                    } 
                    else if(iq > 120) {
                        job = "💻 Lập trình viên - dân IT";
                    } 
                    else {
                        let jobs = [
                            "👷 Công nhân","🎤 Hài độc thoại","🚚 Shipper",
                            "🧹 Lao công","🧱 Phụ hồ","🛡️ Bảo vệ",
                            "🍜 Phục vụ quán ăn","🏭 Công nhân nhà máy",
                            "🚕 Tài xế xe ôm","📦 Bốc vác",
                            "🛒 Nhân viên siêu thị","🛐 Bán vé số"
                        ];
                        job = jobs[Math.floor(Math.random() * jobs.length)];
                    }

                    hasJob = true;
                    showStatus("💼 Nhận việc: " + job);
                }

                else if(canChangeJob){
                    let jobs = [
                        "👷 Công nhân","🎤 Hài độc thoại","🚚 Shipper",
                        "🧹 Lao công","🧱 Phụ hồ","🛡️ Bảo vệ",
                        "🍜 Phục vụ quán ăn","🏭 Công nhân nhà máy",
                        "🚕 Tài xế xe ôm","📦 Bốc vác",
                        "🛒 Nhân viên siêu thị","🛐 Bán vé số"
                    ];

                    job = jobs[Math.floor(Math.random() * jobs.length)];
                    canChangeJob = false;
                    showStatus("🔄 Đổi nghề thành: " + job);
                }

                else{
                    let income = 400 + iq;

                    if(job.includes("CEO")) income += 2000;
                    if(job.includes("IT")) income += 1000;

                    money += income;
                    showStatus("💰 Kiếm được " + income + "$");
                }
            }
        },

        {
            text:"🏦 Tiết kiệm",
            action:()=>{
                savings+=350;
                money-=300;
                showStatus("🏦 Gửi nhà bank");
            }
        },

        {
            text:"📈 Đầu tư",
            action:()=>{
                money-=500;
                if(Math.random()>0.5){
                    investment+=3000;
                    showStatus("💰 Lãi lớn!");
                }else{
                    investment-=1500;
                    moneyEffect();
                    showStatus("💸 Lỗ!");
                }
            }
        },

        {
            text:"❤️ Hẹn hò",
            action:()=>{
                if(!lover){
                    lover=names[Math.floor(Math.random()*names.length)];
                    heartEffect();
                    showStatus("😊 Chính thức hết độc thân");
                }else{
                    showStatus("❤️ Đang yêu "+lover);
                }
            }
        }
    ];

    realActions.forEach(a=>{
        let btn=document.createElement("button");
        btn.innerText=a.text;
        btn.onclick=()=>next(a.action);
        div.appendChild(btn);
    });
}

/* END */
function endGame(text){
    gameOver=true;
    updateUI(text);
    document.getElementById("buttons").innerHTML =
        '<button onclick="location.reload()">Chơi lại</button>';
}

function ending(){
    let total = money + savings + investment;

    let endings = {
        richLove: ["👑 Vua xuyên không- tiền không thiếu tình không vơi","💎 Đại gia và em hàng ngon nghẻ","🏆 Cuộc đời viên mãn level max"],
        richSolo: ["💰 Fuba cô độc- đếm tiền mỗi tay","😎 Giàu nhưng không ai yêu","🏦 Chủ tịch thích ngủ 1 mình"],
        midLove: ["💖 Đời không plot twist","😊 Ổn định","🌸 Hạnh phúc"],
        midSolo: ["😐 Bình bình","🐱 Sống ổn định với 50 con mèo","🧍‍♂️ Một mình nhưng ổn"],
        poorLove: ["❤️ Mụt túp lều tranh hai trái tim vàng","🥰 Nghèo nhưng hạnh phúc","💑 Tình yêu Vượt khó"],
        poorSolo: ["😢 Thất bại toàn tập","💀 Đã nghèo còn cô đơn","🪦 Game over- chơi j ngu vại"]
    };

    let pool;

    if(total > 40000){
        pool = lover ? endings.richLove : endings.richSolo;
    } 
    else if(total > 15000){
        pool = lover ? endings.midLove : endings.midSolo;
    } 
    else {
        pool = lover ? endings.poorLove : endings.poorSolo;
    }

    let result = pool[Math.floor(Math.random() * pool.length)];
    endGame(result);
}

/* INIT */
updateUI();
renderButtons();
</script>
</body>  
</html>
